services:
  vpn:
    build: ./vpn
    container_name: sjtu-vpn
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.conf.all.accept_redirects=0
      - net.ipv4.conf.all.send_redirects=0
    secrets:
      - sjtu_password
    environment:
      - SJTU_USERNAME=${SJTU_USERNAME}
    ports:
      - "127.0.0.1:18789:18789"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ipsec", "status", "sjtu-student"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  openclaw:
    build: ./openclaw
    container_name: sjtu-openclaw
    network_mode: "service:vpn"
    depends_on:
      vpn:
        condition: service_healthy
    command: openclaw gateway --allow-unconfigured
    volumes:
      - openclaw-data:/root/.openclaw
    restart: unless-stopped

volumes:
  openclaw-data:

secrets:
  sjtu_password:
    file: ./secrets/sjtu_password.txt